# This is a workflow for UncleGrumpy/atomvm_spectrometer to publish documentation to GitHub Pages

name: Publish Docs

on:
  # Triggers the workflow on pushes to main
  push:
    branches:
      - 'main'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref != 'refs/heads/main' && github.ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

env:
  LANG: C.UTF-8

jobs:

  build:
    runs-on: ubuntu-24.04
    container: erlang:28
    steps:

    - name: "Checkout code"
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

    - name: "Setup Pages"
      uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b

    - name: "Build Docs"
      run: |
        rebar3 as doc ex_doc

    - name: Upload pages artifact
      ## Must use v3 for now due to issue actions/deploy-pages#389
      uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b
      with:
        name: github-pages
        path: ./doc

  deploy:
    # Add a dependency to the build job
    needs: build

    # Deploy to the github-pages environment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    # Specify runner + deployment step
    runs-on: ubuntu-24.04
    steps:

      - name: "Setup Pages"
        if: ${{ github.repository == 'UncleGrumpy/atomvm_spectrometer' }}
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b

      - name: Deploy to GitHub Pages
        if: ${{ github.repository == 'UncleGrumpy/atomvm_spectrometer' }}
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e
